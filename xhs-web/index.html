        <div class="ol-top"><span class="ol-brand">${Utils.escapeHtml(o.brandName)}${o.productName?`<span class="ol-product"> · ${Utils.escapeHtml(o.productName)}</span>`:''}</span><span class="tag ${o.progressInfo.cls}">${o.progressInfo.label}</span></div>
        <div class="ol-middle"><span class="ol-price">¥${o.price}</span><span class="ol-profit ${o.isValidForProfit?'valid':'invalid'}">净利 ¥${Utils.formatMoney(o.profit.netProfit)} (${o.profit.profitRate}%)</span></div>
        ${o.contentTypeText||o.competitionText?`<div class="ol-tags">${o.contentTypeText?`<span class="ol-tag">📝 ${o.contentTypeText}</span>`:''}${o.competitionText?`<span class="ol-tag blue">🎯 ${o.competitionText}</span>`:''}</div>`:''}
        <div class="ol-bottom text-gray">档期：${o.scheduleDate||'-'} <span style="margin-left:auto">创建：${o.createTime}</span></div>
      </div>`).join('')}</div>`;
    }

    // 进度分布
    if(progressDist.length>0){
      html+=`<div class="section-card"><div class="section-title">📊 推进状态分布</div>${progressDist.map(item=>`<div class="prog-bar-wrap"><div class="prog-bar-row"><span class="prog-icon">${item.icon}</span><span class="prog-name">${item.label}</span><span class="prog-count">${item.count}单</span></div><div class="prog-fill-bg"><div class="prog-fill" style="width:${item.count/orderList.length*100}%"></div></div></div>`).join('')}</div>`;
    }

    if(stats.totalCount===0&&orderList.length===0){
      html+=`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">暂无统计数据</div><div class="empty-sub">添加商单后这里会显示数据统计</div></div>`;
    }
    html+='<div style="height:20px"></div></div></div>';
    document.getElementById('pageContent').innerHTML=html;
  },
  setPeriod(p){this.period=p;this.load();}
};

const QuoteActions={
  load(){
    const templates=Storage.getQuoteTemplates();
    let html=`<div class="page active"><div style="overflow-y:auto;max-height:calc(100vh - 120px);">
    <div class="section-card"><div class="section-title">💰 报价计算器</div>
    <div class="calc-desc text-gray">根据粉丝数、互动率、内容类型智能估算合理报价区间</div>
    <div class="form-group" style="margin-top:16px"><div class="form-label required">基础报价（元）</div>
    <div class="input-prefix-wrap"><span class="input-prefix">¥</span><input class="form-input input-with-prefix" type="number" id="q_basePrice" placeholder="你的基础报价" oninput="QuoteActions.calculate()" value=""/></div></div>
    <div class="form-group"><div class="form-label">内容类型</div>
    <select class="picker-select" id="q_contentType" onchange="QuoteActions.calculate()">${QUOTE_CONTENT_TYPES.map((c,i)=>`<option value="${c}"${i===0?' selected':''}>${c}</option>`).join('')}</select></div>
    <div class="two-col"><div class="form-group col"><div class="form-label">粉丝数</div><input class="form-input" type="number" id="q_followers" placeholder="如：100000" oninput="QuoteActions.calculate()"/></div><div class="form-group col"><div class="form-label">互动率（%）</div><input class="form-input" type="digit" id="q_engagement" placeholder="如：3.5" oninput="QuoteActions.calculate()"/></div></div></div>

    <div class="result-card" id="quoteResult" style="display:none"></div>

    ${templates.length>0?`<div class="section-card"><div class="section-title">📌 快速套用模板</div><div class="template-list">${templates.map(t=>`<div class="template-item"><div class="tpl-left"><div class="tpl-name">${Utils.escapeHtml(t.name)}</div><div class="tpl-desc text-gray">${t.desc||'点击套用基础报价'}</div></div><div class="tpl-right"><div class="tpl-price text-money">¥${t.basePrice}</div><div class="tpl-del" onclick="Storage.deleteQuoteTemplate('${t.id}');UI.toast('已删除');QuoteActions.load();event.stopPropagation();">删除</div></div></div>`).join('')}</div></div>`:''}

    <div class="section-card"><div class="section-title">📖 计算说明</div><div class="tip-list">
      <div class="tip-item"><span class="tip-icon">📷</span><span class="tip-text">图文笔记：1x 基础系数</span></div>
      <div class="tip-item"><span class="tip-icon">🎥</span><span class="tip-text">视频笔记：2.5x 基础系数</span></div>
      <div class="tip-item"><span class="tip-icon">📺</span><span class="tip-text">直播带货：5x 基础系数</span></div>
      <div class="tip-item"><span class="tip-icon">📊</span><span class="tip-text">互动率≥5%：报价+20%；≥3%：+10%</span></div>
      <div class="tip-item"><span class="tip-icon">👥</span><span class="tip-text">每10万粉丝：报价+5%</span></div>
    </div></div>

    <div class="add-template-area"><div class="add-tpl-btn" onclick="QuoteActions.showAddTpl()">+ 添加报价模板</div></div>
    <div style="height:20px"></div></div></div>`;
    document.getElementById('pageContent').innerHTML=html;
  },
  calculate(){
    const bp=parseFloat(document.getElementById('q_basePrice').value);
    if(!bp){document.getElementById('quoteResult').style.display='none';return;}
    const ct=document.getElementById('q_contentType').value;
    const fl=parseFloat(document.getElementById('q_followers').value)||0;
    const eg=parseFloat(document.getElementById('q_engagement').value)||0;
    const mult=CONTENT_MULTIPLIER[ct]||1;
    const fb=fl>0?Math.max(1,1+(fl/100000)*0.05):1;
    const eb=eg>=5?1.2:eg>=3?1.1:1;
    let price=bp*mult*fb*eb;
    const low=Math.round(price*0.8),high=Math.round(price*1.2),suggest=Math.round(price);
    document.getElementById('quoteResult').style.display='';
    document.getElementById('quoteResult').innerHTML=`
      <div class="result-main"><div class="result-label">建议报价</div><div class="result-price text-primary">¥${Utils.formatMoney(suggest)}</div><div class="result-range text-gray">合理区间：¥${Utils.formatMoney(low)} ~ ¥${Utils.formatMoney(high)}</div></div>
      <div class="result-detail">
        <div class="detail-row-sm"><span class="dr-label">内容系数</span><span class="dr-value">${mult}x（${ct}）</span></div>
        <div class="detail-row-sm"><span class="dr-label">粉丝加成</span><span class="dr-value">${fl>0?`+${((fb-1)*100).toFixed(1)}%（${(fl/10000).toFixed(0)}万粉)`:'未填写'}</span></div>
        <div class="detail-row-sm"><span class="dr-label">互动加成</span><span class="dr-value">${eg>0?(eb===1.2?'+20%':eb===1.1?'+10%':'标准')+`（互动率${eg}%）`:'未填写'}</span></div>
      </div>
      <div class="copy-quote-btn" onclick="navigator.clipboard.writeText(\`【报价参考】\\n内容类型：${ct}\\n粉丝数：${fl?fl+'人':'未填'}\\n互动率：${eg?eg+'%':'未填'}\\n\\n建议报价：¥${Utils.formatMoney(suggest)}\\n报价区间：¥${Utils.formatMoney(low)} ~ ¥${Utils.formatMoney(high)}\`);UI.toast('已复制报价单')">📋 复制报价单</div>`;
  },
  showAddTpl(){
    UI.showModal(`<div class="modal-header"><span class="modal-title-b">添加报价模板</span><span class="modal-close-b" onclick="UI.closeModal()">✕</span></div>
      <div class="form-group"><div class="form-label required">模板名称</div><input class="form-input" id="tpl_name" placeholder="如：视频种草"/></div>
      <div class="form-group"><div class="form-label required">基础报价（元）</div><div class="input-prefix-wrap"><span class="input-prefix">¥</span><input class="form-input input-with-prefix" type="number" id="tpl_basePrice" placeholder="基础报价"/></div></div>
      <div class="form-group"><div class="form-label">备注说明</div><input class="form-input" id="tpl_desc" placeholder="可选"/></div>
      <div class="modal-btns"><div class="modal-btn cancel" onclick="UI.closeModal()">取消</div><div class="modal-btn confirm" onclick="const n=document.getElementById('tpl_name').value.trim(),bp=document.getElementById('tpl_basePrice').value;if(!n||!bp){UI.toast('请填写模板名称和基础报价');return;}Storage.saveQuoteTemplate({id:Utils.genId(),name:n,basePrice:parseFloat(bp),desc:document.getElementById('tpl_desc').value.trim()});UI.toast('模板已保存');UI.closeModal();QuoteActions.load();">保存</div></div>`);
  }
};

// --- 返点管理操作 ---
const RebateActions={
  load(){
    const rebates=Storage.getRebates();
    const orders=Storage.getOrders();
    let totalExp=0,totalRec=0,totalPen=0;
    rebates.forEach(r=>{
      const amt=parseFloat(r.amount)||0;
      if(r.status==='received')totalRec+=amt;
      else if(r.status==='pending'){totalPen+=amt;totalExp+=amt;}
      else totalExp+=amt;
    });
    totalExp+=totalRec;

    const rebatesList=rebates.map(r=>({...r,statusLabel:r.status==='received'?'已收取':r.status==='overdue'?'逾期':'待收取',statusCls:r.status==='received'?'tag-settled':r.status==='overdue'?'tag-cancelled':'tag-pending',amountText:Utils.formatMoney(r.amount)}));

    let html=`<div class="page active">
    <div class="stats-bar"><div class="stat-item"><div class="stat-val-rebate">¥${Utils.formatMoney(totalExp)}</div><div class="stat-name">应收总计</div></div>
    <div class="stat-item highlight"><div class="stat-val-rebate green">¥${Utils.formatMoney(totalRec)}</div><div class="stat-name">已收返点</div></div>
    <div class="stat-item"><div class="stat-val-rebate orange">¥${Utils.formatMoney(totalPen)}</div><div class="stat-name">待收返点</div></div></div>

      <div class="rebate-info"><span class="text-gray">${r.type==='percent'?r.rate+'%返点':r.type==='product'?'产品置换':'固定返点'}${r.dueDate?` · 到期：${r.dueDate}`:''}</span></div>
      <div class="rebate-footer"><span class="tag ${r.statusCls}">${r.statusLabel}</span><div class="rebate-actions">

        <span class="action-btn-sm edit-btn-sm" onclick="RebateActions.editForm('${r.id}')">编辑</span>
        <span class="action-btn-sm del-btn-sm" onclick="UI.confirm('确认删除','确定删除此返点记录吗？',()=>{Storage.deleteRebate('${r.id}');UI.toast('已删除');RebateActions.load();});event.stopPropagation();">删除</span>
      </div></div>
      ${r.notes?`<div class="rebate-notes">💬 ${Utils.escapeHtml(r.notes)}</div>`:''}
    </div>`).join(''):''}</div>

    ${rebatesList.length===0?`<div class="empty-state"><div class="empty-icon">🎁</div><div class="empty-text">还没有返点记录</div><div class="empty-sub">点击「记录返点」开始管理你的返点</div></div>`:''}

  showAddForm(){

    const orderNames=orders.map(o=>`${o.brandName}（¥${o.price}）`);

      <div style="max-height:65vh;overflow-y:auto;">
      <div class="form-group"><div class="form-label required">品牌名称</div>

      <div class="form-group" id="r_type_row" style="display:none"><div class="form-label">返点比例（%）</div><div class="input-suffix-wrap"><input class="form-input" type="number" id="r_rate" placeholder="如：10" oninput="RebateActions.autoCalc()"/><span class="input-suffix">%</span></div></div>

      <div class="form-group"><div class="form-label">到期日期</div><input type="date" class="picker-select" id="r_dueDate"/></div>
      <div class="form-group"><div class="form-label">状态</div><select class="picker-select" id="r_status">${REBATE_STATUSES.map((s,i)=>`<option value="${REBATE_STATUS_VALUES[i]}">${s}</option>`).join('')}</select></div>

    // Show/hide type row
    setTimeout(()=>{
      const typeSel=document.getElementById('r_type');
      const typeRow=document.getElementById('r_type_row');
      if(typeSel&&typeRow)typeRow.style.display=typeSel.value==='percent'?'':'none';
    },50);
  },
  autoCalc(){
    const rate=document.getElementById('r_rate')?.value;
    const bp=document.getElementById('r_basePrice')?.value;
    if(rate&&bp){
      const amt=Math.round(parseFloat(bp)*parseFloat(rate)/100);
      const amtEl=document.getElementById('r_amount');
      if(amtEl)amtEl.value=String(amt);
    }
  },
  editForm(id){
    const r=Storage.getRebates().find(x=>x.id===id);if(!r)return;
    const tIdx=REBATE_TYPE_VALUES.indexOf(r.type);
    const sIdx=REBATE_STATUS_VALUES.indexOf(r.status||'pending');
    UI.showModal(`<div class="modal-header"><span class="modal-title-b">编辑返点</span><span class="modal-close-b" onclick="UI.closeModal()">✕</span></div>
      <div style="max-height:65vh;overflow-y:auto;">
      <div class="form-group"><div class="form-label required">品牌名称</div><input class="form-input" id="r_brandName" value="${Utils.escapeHtml(r.brandName||'')}"/></div>
      <div class="form-group"><div class="form-label">返点类型</div><select class="picker-select" id="r_type">${REBATE_TYPES.map((t,i)=>`<option value="${REBATE_TYPE_VALUES[i]}"${i===tIdx?' selected':''}>${t}</option>`).join('')}</select></div>
      <div class="form-group"><div class="form-label required">返点金额（元）</div><div class="input-prefix-wrap"><span class="input-prefix">¥</span><input class="form-input input-with-prefix" type="number" id="r_amount" value="${r.amount}"/></div></div>
      <div class="form-group"><div class="form-label">到期日期</div><input type="date" class="picker-select" id="r_dueDate" value="${r.dueDate||''}"/></div>
      <div class="form-group"><div class="form-label">状态</div><select class="picker-select" id="r_status">${REBATE_STATUSES.map((s,i)=>`<option value="${REBATE_STATUS_VALUES[i]}"${i===sIdx?' selected':''}>${s}</option>`).join('')}</select></div>
      <div class="form-group"><div class="form-label">备注</div><input class="form-input" id="r_notes" value="${Utils.escapeHtml(r.notes||'')}"/></div></div>
      <div class="modal-btns"><div class="modal-btn cancel" onclick="UI.closeModal()">取消</div><div class="modal-btn confirm" onclick="RebateActions.saveRebate(true,'${id}')">保存修改</div></div>`);
  },
  saveRebate(isEdit,id){
    const bn=(document.getElementById('r_brandName').value||'').trim();
    if(!bn){UI.toast('请填写品牌名称');return;}
    const amt=document.getElementById('r_amount').value;
    if(!amt){UI.toast('请填写返点金额');return;}
    const rebate={
      ...(isEdit?(Storage.getRebates().find(x=>x.id===id)||{}):{}),
      id:isEdit?id:Utils.genId(),
      orderId:document.getElementById('r_orderSel')?.value!==undefined?Storage.getOrders()[document.getElementById('r_orderSel').value]?.id||'':undefined,
      brandName:bn,
      amount:parseFloat(amt),
      type:document.getElementById('r_type').value,
      rate:document.getElementById('r_rate')?.value||'',
      dueDate:document.getElementById('r_dueDate')?.value||'',
      status:document.getElementById('r_status')?.value||'pending',
      notes:(document.getElementById('r_notes')?.value||'').trim(),
      createTime:Utils.today()
    };
    Storage.saveRebate(rebate);
    UI.closeModal();
    UI.toast(isEdit?'已更新':'已记录');
    RebateActions.load();
  }
};

// --- 商单对账单操作 ---
const ReconciliationActions={
  _month:'',
  _orders:[],
  load(){
    const now=new Date();
    this._month=Router.pageParams.month||`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    this.render();
  },
  changeMonth(){
    this._month=document.getElementById('recon_month').value;
    this.render();
  },
  render(){
    const orders=Storage.getOrders().map(o=>({...o,profit:Utils.calcProfit(o),progressInfo:Utils.getProgressInfo(o.progress)}));
    // 按月份过滤（按排期日期或创建时间）
    let filtered=orders.filter(o=>{
      if(!this._month) return true;
      return (o.scheduleDate||'').startsWith(this._month)||(o.createTime||'').startsWith(this._month);
    });
    filtered.sort((a,b)=>(a.scheduleDate||a.createTime||'').localeCompare(b.scheduleDate||b.createTime||''));

    this._orders=filtered;

    // 汇总数据
    const totalRevenue=filtered.reduce((s,o)=>s+(parseFloat(o.price)||0),0);
    const totalOnlineRebate=filtered.reduce((s,o)=>s+(o.profit.onlineRebateAmount||0),0);
    const totalOfflineRebate=filtered.reduce((s,o)=>{
      const offR=parseFloat(o.offlineRebateRate)||0;
      return s+(parseFloat(o.price)||0)*(offR/100);
    },0);
    const totalPotatoCost=filtered.reduce((s,o)=>s+(parseFloat(o.potatoCost)||0),0);
    const totalLaborCost=filtered.reduce((s,o)=>s+(parseFloat(o.laborCost)||0),0);
    const totalNetProfit=filtered.filter(o=>Utils.isValidForProfit(o)).reduce((s,o)=>s+(o.profit.netProfit||0),0);

    // 生成月选项
    const months=this._getMonthOptions(orders);
    const monthOpts=months.map(m=>`<option value="${m}"${m===this._month?' selected':''}>${m}</option>`).join('');

    let html=`<div class="page active recon-page">
    <div class="recon-toolbar">
      <select class="recon-month-select" id="recon_month" onchange="ReconciliationActions.changeMonth()">${monthOpts}</select>
      <button class="recon-export-btn" onclick="ReconciliationActions.exportCSV()">📥 导出</button>
    </div>
    <div class="recon-summary" style="display:flex;gap:10px;margin-top:14px;">
      <div style="flex:1;background:#fff;border-radius:12px;padding:20px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);">
        <p style="margin:0;font-size:24px;font-weight:700;color:#222;">${filtered.length}</p>
        <p style="margin:6px 0 0;font-size:13px;color:#777;">商单数</p>
      </div>
      <div style="flex:1;background:#fff;border-radius:12px;padding:20px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);">
        <p style="margin:0;font-size:24px;font-weight:700;color:var(--primary);">¥${Utils.formatMoney(totalRevenue)}</p>
        <p style="margin:6px 0 0;font-size:13px;color:#777;">总收入</p>
      </div>
      <div style="flex:1;background:#fff;border-radius:12px;padding:20px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);">
        <p style="margin:0;font-size:24px;font-weight:700;color:var(--text-orange);">¥${Utils.formatMoney(totalOnlineRebate+totalOfflineRebate)}</p>
        <p style="margin:6px 0 0;font-size:13px;color:#777;">返点合计</p>
      </div>
      <div style="flex:1;background:#fff;border-radius:12px;padding:20px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);">
        <p style="margin:0;font-size:24px;font-weight:700;color:var(--text-green);">¥${Utils.formatMoney(totalNetProfit)}</p>
        <p style="margin:6px 0 0;font-size:13px;color:#777;">净利润</p>
      </div>
    </div>
    <div class="recon-table-wrap"><table class="recon-table">
    <thead><tr>
      <th>品牌</th><th>产品</th><th>档期</th><th>报价</th>
      <th>线上返点</th><th>线下返点</th><th>薯条</th><th>女工</th>
      <th>净利润</th><th>状态</th>
    </tr></thead><tbody>`;

    if(filtered.length>0){
      filtered.forEach(o=>{
        const oR=parseFloat(o.onlineRebateRate)||0;
        const offR=parseFloat(o.offlineRebateRate)||0;
        const p=parseFloat(o.price)||0;
        const oRA=Math.round(p*oR/100);
        const offRA=Math.round(p*offR/100);
        const potatoC=parseFloat(o.potatoCost)||0;
        const laborC=parseFloat(o.laborCost)||0;
        html+=`<tr onclick="Router.navigate('orderDetail',{id:\'${o.id}'})">
          <td title="${Utils.escapeHtml(o.brandName)}" class="recon-brand-cell">${Utils.escapeHtml(o.brandName)}</td>
          <td>${Utils.escapeHtml(o.productName)||'-'}</td>
          <td>${o.scheduleDate?Utils.formatDate(o.scheduleDate):'-'}</td>
          <td class="recon-price-cell">¥${p.toLocaleString()}</td>`;
          html+=oR>0?`<td class="recon-rebate-cell">${oR}% (¥${oRA})</td>`:`<td>-</td>`;
          html+=offR>0?`<td class="recon-rebate-cell">${offR}% (¥${offRA})</td>`:`<td>-</td>`;
          html+=potatoC>0?`<td class="recon-cost-cell">-¥${potatoC}</td>`:`<td>-</td>`;
          html+=laborC>0?`<td class="recon-cost-cell">-¥${laborC}</td>`:`<td>-</td>`;
          html+=`<td class="recon-profit-cell">${Utils.isValidForProfit(o)?'¥'+Utils.formatMoney(o.profit.netProfit):'-'}</td>
          <td><span class="recon-status-tag ${o.progressInfo.cls}">${o.progressInfo.label}</span></td></tr>`;
      });
      // 合计行
      html+=`<tfoot><tr>
        <td colspan="3">合计 (${filtered.length} 单)</td>
        <td class="recon-price-cell">¥${Utils.formatMoney(totalRevenue)}</td>
        <td style="color:var(--text-orange)">¥${Utils.formatMoney(totalOnlineRebate)}</td>
        <td style="color:var(--text-orange)">¥${Utils.formatMoney(totalOfflineRebate)}</td>
        <td style="color:var(--text-red)">¥${Utils.formatMoney(totalPotatoCost)}</td>
        <td style="color:var(--text-red)">¥${Utils.formatMoney(totalLaborCost)}</td>
        <td class="recon-profit-cell">¥${Utils.formatMoney(totalNetProfit)}</td>
        <td></td>
      </tr></tfoot>`;
    }else{
      html+=`</tbody></table><div class="recon-empty"><div class="recon-empty-icon">📋</div><div>该月份暂无商单数据</div></div>`;
    }

    html+=`</table></div></div>`;
    document.getElementById('pageContent').innerHTML=html;
  },
  _getMonthOptions(orders){
    const set=new Set();
    orders.forEach(o=>{
      const d=(o.scheduleDate||o.createTime||'').slice(0,7);
      if(d)set.add(d);
    });
    return Array.from(set).sort().reverse();
  },
  exportCSV(){
    const esc=s=>`"${(s||'-').toString().replace(/"/g,'""')}"`;
    const rows=[['品牌','产品','档期','报价','线上返点率','线上返点金额','线下返点率','线下返点金额','薯条成本','女工成本','净利润','状态']];
    this._orders.forEach(o=>{
      const oR=parseFloat(o.onlineRebateRate)||0;
      const offR=parseFloat(o.offlineRebateRate)||0;
      const p=parseFloat(o.price)||0;
      rows.push([
        esc(o.brandName),esc(o.productName)||'-',o.scheduleDate||'-',
        p,oR+'%',Math.round(p*oR/100),
        offR+'%',Math.round(p*offR/100),
        parseFloat(o.potatoCost)||0,
        parseFloat(o.laborCost)||0,
        Utils.isValidForProfit(o)?o.profit.netProfit:'-',
        Utils.getProgressInfo(o.progress).label
      ]);
    });
    const csv='\uFEFF'+rows.map(r=>r.join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`商单对账单_${this._month}.csv`;a.click();URL.revokeObjectURL(url);
    UI.toast('已导出对账单');
  }
};

// --- 品牌列表操作 ---
const BrandListActions={
  load(){
    const orders=Storage.getOrders();
    const brands=Storage.getBrands().map(b=>{
      const bo=orders.filter(o=>o.brandId===b.id||o.brandName===b.name);
      const rev=bo.filter(o=>o.progress!=='abnormal').reduce((s,o)=>s+(parseFloat(o.price)||0),0);
      return {...b,orderCount:bo.length,totalRevenueText:Utils.formatMoney(rev),initial:(b.name||'').charAt(0)};
    });
    this._brands=brands;
    this._render(brands);
  },
  _brands:[],
  _keyword:'',
  search(){
    this._keyword=(document.getElementById('bs_search')?.value||'').toLowerCase();
    const kw=this._keyword;
    const list=kw?this._brands.filter(b=>(b.name||'').toLowerCase().includes(kw)||(b.industry||'').toLowerCase().includes(kw)||(b.contactName||'').toLowerCase().includes(kw)):this._brands;
    this._render(list);
  },
  _render(filtered){
    let html=`<div class="page active">
    <div class="search-bar"><div class="search-input-wrap"><span class="search-icon">🔍</span><input class="search-input" id="bs_search" placeholder="搜索品牌、行业、联系人..." oninput="BrandListActions.search()"/></div><div class="add-btn" onclick="Router.navigate(\'brandDetail\')">+添加</div></div>
    ${filtered.length>0?`<div class="export-bar"><div class="export-btn" onclick="BrandListActions.exportCSV()">📥 导出联系方式 (CSV)</div></div>`:''}
    <div class="brand-list-page">${filtered.length>0?filtered.map(b=>`<div class="brand-card" onclick="Router.navigate(\'brandDetail',{id:\'${b.id}'})">
      <div class="brand-avatar"><span class="avatar-text">${b.initial}</span></div>
      <div class="brand-info-page"><div class="brand-name-row"><span class="brand-name-page">${Utils.escapeHtml(b.name)}</span>${b.industry?`<span class="brand-industry">${Utils.escapeHtml(b.industry)}</span>`:''}</div>
      ${b.contactName?`<div class="contact-info-b"><span class="contact-icon-b">👤</span><span class="contact-name-b">${Utils.escapeHtml(b.contactName)}</span></div>`:''}
      ${b.contactWx?`<div class="contact-info-b"><span class="contact-icon-b">📧</span><span class="contact-name-b">${Utils.escapeHtml(b.contactWx)}</span></div>`:''}
      ${b.rebatePolicy?`<div class="contact-info-b" style="color:var(--text-orange);font-size:11px;"><span class="contact-icon-b">💰</span><span class="contact-name-b">${Utils.escapeHtml(b.rebatePolicy)}</span></div>`:''}<div class="brand-stats-b"><span class="stat-text-b">共 ${b.orderCount} 单</span><span class="stat-sep-b">·</span><span class="text-money stat-text-b">¥${b.totalRevenueText}</span></div></div>
      <div class="brand-action"><span class="more-icon-b">›</span></div>
    </div>`).join(''):`<div class="empty-state"><div class="empty-icon">🏢</div><div class="empty-text">${this._keyword?'未找到匹配结果':'还没有品牌联系方式'}</div><div class="empty-sub"${this._keyword?'':' style=""'}>${this._keyword?'':'点击「+添加」录入品牌信息'}</div></div>`}
    </div>`;
    document.getElementById('pageContent').innerHTML=html;
  },
  exportCSV(){
    const brands=Storage.getBrands();
    let csv='\uFEFF品牌名称,所属行业,联系人,职位,微信号,返点政策,合作备注\n';
    const esc=s=>`"${(s||'-').toString().replace(/"/g,'""')}"`;
    brands.forEach(b=>csv+=[esc(b.name),esc(b.industry),esc(b.contactName),esc(b.contactTitle),esc(b.contactWx),esc(b.rebatePolicy),esc(b.notes)].join(',')+'\n');

    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='商单品牌联系方式.csv';a.click();
    URL.revokeObjectURL(url);
    UI.toast(`已导出 ${brands.length} 条数据`);
  }
};

// --- 品牌详情操作 ---
const BrandDetailActions={
  _isEdit:false,_bid:null,
  save(){
    const name=(document.getElementById('b_name').value||'').trim();
    if(!name){UI.toast('请填写品牌名称');return;}
    const brand={
      ...this._isEdit?(Storage.getBrandById(this._bid)||{}):{},
      id:this._isEdit?this._bid:Utils.genId(),
      name:name,
      industry:document.getElementById('b_industry').value,
      notes:(document.getElementById('b_notes').value||'').trim(),
      contactName:(document.getElementById('b_contactName').value||'').trim(),
      contactTitle:(document.getElementById('b_contactTitle').value||'').trim(),
      contactWx:(document.getElementById('b_contactWx').value||'').trim(),
      cooperationHistory:(document.getElementById('b_cooperationHistory').value||'').trim(),
      updateTime:Utils.today()
    };
    Storage.saveBrand(brand);
    UI.toast(this._isEdit?'已更新':'品牌已保存');
    setTimeout(()=>Router.goBack(),800);
  },
  del(){
    UI.confirm('确认删除','确定删除该品牌吗？',()=>{
      Storage.deleteBrand(this._bid);
      UI.toast('已删除');
      setTimeout(()=>Router.goBack(),800);
    });
  }
};
